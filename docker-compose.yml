services:
  backend:
    image: ghcr.io/xiaomayi-ant/orig-bot-backend:latest
    env_file:
      - ./backend/.env
    environment:
      # Override hosts to point to external services (from your env)
      HOST: 0.0.0.0
      PORT: 3001
    ports:
      - "3001:3001"
    restart: unless-stopped

  prisma-migrate:
    image: ghcr.io/xiaomayi-ant/orig-bot-frontend-migrator:latest
    env_file:
      - ./frontend/.env
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      - backend
    restart: "no"

  frontend:
    image: ghcr.io/xiaomayi-ant/orig-bot-frontend:latest
    env_file:
      - ./frontend/.env
    environment:
      # Ensure frontend talks to backend container host/port from env (server-side fetching)
      LANGGRAPH_API_URL: http://backend:3001/api
      # Limit Node.js heap to prevent OOM from leaking connections
      NODE_OPTIONS: "--max-old-space-size=512"
    depends_on:
      - backend
      - prisma-migrate
    ports:
      - "3000:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:3000/smart-bot/api/auth/guest"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    name: smart-agent

